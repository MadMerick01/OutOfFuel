<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Out Of Fuel Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="overlay" aria-live="polite">
      <h1 class="title">OUT OF FUEL</h1>

      <p id="countdown" class="countdown">--:--</p>
      <p id="state" class="state state-safe">SAFE</p>
      <p id="fuel" class="fuel">Fuel --%</p>
      <p id="leak" class="leak">LEAK PAUSED</p>
      <p id="drain" class="meta">Drain -- /sec</p>

      <div id="holdWrap" class="hold-wrap" hidden>
        <div id="holdBar" class="hold-bar"></div>
      </div>

      <button id="refuel" class="refuel" type="button" hidden>REFUEL</button>
      <p id="status" class="status" hidden>Agent not running</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
